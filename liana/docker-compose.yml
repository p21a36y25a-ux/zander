version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: liana-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: liana_hr
      MYSQL_USER: liana
      MYSQL_PASSWORD: liana_password
    ports:
      - '3306:3306'
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - liana_mysql_data:/var/lib/mysql

  backend:
    image: node:20
    container_name: liana-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace backend"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - mysql
    ports:
      - '3000:3000'

  frontend:
    image: node:20
    container_name: liana-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace frontend -- --host"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - backend
    ports:
      - '5173:5173'

volumes:
  liana_mysql_data:
